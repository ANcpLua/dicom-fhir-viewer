services:
  orthanc:
    image: orthancteam/orthanc:25.2.0
    container_name: dicom-fhir-viewer-orthanc
    restart: unless-stopped
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-storage:/var/lib/orthanc/db
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8042/dicom-web/studies',timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  orthanc-storage:
