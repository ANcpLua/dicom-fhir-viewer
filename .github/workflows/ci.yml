name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Start Orthanc
        run: |
          docker run -d --name orthanc -p 8042:8042 \
            -e ORTHANC__AUTHENTICATION_ENABLED=false \
            orthancteam/orthanc:25.2.0
          for i in $(seq 1 30); do
            curl -sf http://localhost:8042/system > /dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "::error::Orthanc failed to become ready"
          docker logs orthanc
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend ────────────────────────────────────────────────────────
      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Typecheck backend
        working-directory: backend
        run: npx tsc -p tsconfig.test.json --noEmit

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm test -- --coverage

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ANcpLua/dicom-fhir-viewer
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      # ── Frontend ───────────────────────────────────────────────────────
      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ANcpLua/dicom-fhir-viewer
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
